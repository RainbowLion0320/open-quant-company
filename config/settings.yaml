  top_list:
    source: tushare_free
    asset: stock
    status: rate_limited
    freq: daily
    enabled: true
    label: 龙虎榜
    cache: stock/top_list/{YYYYMMDD}.parquet
  broker_recommend:
    source: tushare_free
    asset: stock
    status: available
    freq: monthly
    enabled: true
    label: 券商月度金股
    cache: stock/broker_recommend/{YYYYMM}.parquet
  research_report:
    source: tushare_free
    asset: stock
    status: rate_limited
    freq: monthly
