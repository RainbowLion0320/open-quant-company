paths:
  runtime_root: var
  store_root: var/store
  cache_root: var/cache
  artifact_root: var/artifacts
  db_root: var/db
data_cleaning:
  ohlcv_integrity:
    enabled: true
  outlier_detection:
    enabled: true
    sigma: 5
    max_daily_change_pct: 0.2
    max_volume_ratio: 15
  suspended_detection:
    enabled: true
    max_flat_days: 60
  missing_value:
    enabled: true
    max_forward_fill: 5
  financial_validation:
    enabled: true
  winsorize:
    enabled: true
    lower_pct: 0.01
    upper_pct: 0.99
risk_control:
  max_single_position:
    enabled: true
    max_pct: 0.25
  max_total_exposure:
    enabled: true
    max_pct: 0.8
  max_orders_per_day:
    enabled: true
    max_count: 20
  max_drawdown_circuit_breaker:
    enabled: true
    max_drawdown_pct: -0.15
  max_single_order_amount:
    enabled: true
    max_amount: 500000
execution:
  live:
    enabled: false
    broker: miniqmt
    require_manual_approval: true
    kill_switch: true
    sdk_modules:
    - xtquant.xttrader
    - xtquant.xttype
    sdk_gateway_factory: broker.live.xtquant_gateway:build_gateway
    sdk_gateway_config:
      userdata_path: ''
      account_type: STOCK
      strategy_name: open_quant_company
      remark_prefix: approval
backtest:
  benchmark: sh000001
  benchmark_name: 上证指数
  initial_cash: 1000000
  periods_per_year: 252
  pool_size: 0
  risk_free:
    mode: curve
    source: treasury_yields
    market: CN
    tenor: 2Y
    max_staleness_days: 10
  start_date: '2020-01-01'
  end_date: '2026-05-10'
  min_bars: 200
  min_history: 63
  alpha_min_score: 30
  rebalance:
    drift_threshold: 0.75
    overlap_threshold: 0.5
    max_idle_days: 28
  max_positions:
    buffett: 8
    multifactor: 10
    cybernetic: 5
    ml_lgbm: 8
  strategy:
    cybernetic:
      ma_long: 20
      ma_short: 10
      max_pos_bear: 2
      max_pos_bull: 8
      max_pos_side: 5
      position_bear: 0.05
      position_bull: 0.3
      position_side: 0.15
      regime_ma_long: 60
      regime_ma_mid: 20
      regime_ma_short: 5
      stop_loss_bear: -0.03
      stop_loss_bull: -0.08
      stop_loss_side: -0.05
    multifactor:
      factor_window_long: 60
      factor_window_short: 21
      max_per_sector: 3
      rebalance_interval_days: 20
      score_base: 50
      score_momentum_weight: 100
      score_volatility_weight: 50
      top_n: 10
buffett:
  circle_of_competence:
    industries:
    - 农林牧渔
    - 基础化工
    - 钢铁
    - 有色金属
    - 电子
    - 家用电器
    - 食品饮料
    - 纺织服饰
    - 轻工制造
    - 医药生物
    - 公用事业
    - 交通运输
    - 房地产
    - 商贸零售
    - 社会服务
    - 综合
    - 建筑材料
    - 建筑装饰
    - 电力设备
    - 国防军工
    - 计算机
    - 传媒
    - 通信
    - 银行
    - 非银金融
    - 汽车
    - 机械设备
    - 石油石化
    - 煤炭
    - 环保
    - 美容护理
    - 待分类
  margin_of_safety:
    dcf_discount_rate: 0.08
    growth_rate_terminal: 0.03
    safety_margin_pct: 0.3
  moat:
    max_debt_equity: 1.5
    min_gross_margin: 0.3
    min_roe: 0.15
    min_roe_years: 5
    sectors:
      bank:
        max_debt_equity: 20.0
        min_net_margin: 0.2
        min_roe: 0.1
        skip_gross_margin: true
      insurance:
        max_debt_equity: 20.0
        min_net_margin: 0.05
        min_roe: 0.08
        skip_gross_margin: true
      securities:
        max_debt_equity: 10.0
        min_net_margin: 0.15
        min_roe: 0.06
        skip_gross_margin: true
  scoring:
    cap_margin: 0.6
    cap_roe: 0.25
    cap_safety: 0.5
    weight_margin: 20
    weight_roe: 30
    weight_safety: 50
  valuation:
    fcf_fallback_ratio: 0.7
    growth_default: 0.05
    growth_max: 0.12
    growth_min: 0.03
    growth_period: 5
    terminal_pe: 20
cybernetics:
  adaptive:
    bear:
      confidence_threshold: 0.6
      max_positions: 8
      position_size: 0.3
      stop_loss: -0.08
    bull:
      confidence_threshold: 0.75
      max_positions: 5
      position_size: 0.15
      stop_loss: -0.05
    detection:
      breadth_bear_threshold: 0.4
      breadth_bull_threshold: 0.55
      breadth_cache_ttl_seconds: 900
      breadth_workers: 8
      breadth_window: 20
      regime_bear_threshold: 40
      regime_bear_trend_breakdown: 0.4
      regime_bull_threshold: 60
      regime_min_dwell: 3
      regime_trend_confirm: 0.55
      volume_contraction: 0.8
      volume_expansion: 1.2
    market_regime_detection: true
    param_tuning_frequency: monthly
    sideways:
      confidence_threshold: 0.7
      max_positions: 6
      position_size: 0.2
      stop_loss: -0.06
    volatility_adjustment: true
  regime_engine: hybrid
  regime_indexes:
    sh000001: 0.25
    sh000300: 0.25
    sz399001: 0.2
    sz399006: 0.15
    sh000905: 0.15
  score_weights:
    trend: 30
    breadth: 30
    risk: 30
    volume: 10
  breadth_weights:
    advance_ratio: 0.35
    above_ma20: 0.3
    above_ma60: 0.25
    above_ma120: 0.1
  risk_strength_weights:
    drawdown: 0.5
    volatility: 0.3
    pressure: 0.2
  hmm_confidence_override: 0.8
  min_bars_trend: 60
  min_bars_risk: 30
  ma_windows:
  - 20
  - 60
  - 120
  vol_normalization:
  - 0.12
  - 0.4
  drawdown_normalization: 0.15
  hmm:
    n_states: 3
    max_iter: 100
    tol: 0.0001
    n_init: 5
    min_df: 3.0
    max_df: 30.0
    feature_window: 252
    min_training_samples: 504
    model_path: data/reference/models/regime_hmm
    fallback_to_rules: true
    observation_columns:
    - return_1d
    - realized_vol_20d
    - skewness_20d
    - kurtosis_20d
    - drawdown_from_peak
    - volume_surprise
    - breadth_momentum
    - correlation_stock_bond
  feedback:
    loop_interval: daily
    max_consecutive_losses: 3
    min_trades_for_review: 10
    min_win_rate: 0.35
    performance_review_days: 30
  hierarchy:
    levels:
    - indicators:
      - 指数趋势
      - 市场情绪
      - 资金流向
      name: 市场环境
      priority: 1
    - indicators:
      - 行业强度
      - 板块资金
      - 政策面
      name: 板块轮动
      priority: 2
    - indicators:
      - 基本面
      - 技术面
      - 估值
      name: 个股筛选
      priority: 3
data:
  cache_days: 1
  cache_dir: var/cache
ingestion:
  fetcher:
    min_interval: 3.0
    jitter_max: 0.5
    max_retries: 3
    base_delay: 2.0
    backoff_factor: 2.0
    jitter_ratio: 0.3
    mem_cache_max: 64
    ttl_forever_hours: 8760
    ttl_daily_hours: 24
    ttl_realtime_hours: 1
    socket_timeout: 30
  index:
    csi300: sh000300
    shanghai: sh000001
    shenzhen: sz399001
  provider: akshare
project:
  name: open-quant-company
  display_name: Open Quant Company
  english_name: Open Quant Company
  description: 开源量化公司操作系统：用户作为 CEO，多个 agent 负责数据、研究、风控、工程与报告，所有结论可回溯到 Web UI、CLI 和 evidence artifacts。
llm:
  default_provider: mimo
  use_cases:
    factor_hypothesis:
      provider: mimo
      model: mimo-v2.5-pro
    agent_planning:
      provider: mimo
      model: mimo-v2.5-pro
  providers:
    deepseek:
      enabled: true
      label: DeepSeek
      protocol: openai_compatible
      api_key_env: DEEPSEEK_API_KEY
      base_url: https://api.deepseek.com/v1
      default_model: deepseek-v4-flash
      request:
        chat_path: /chat/completions
        response_format_json: true
        temperature: 0.1
        timeout_seconds: 20
      balance_url: https://api.deepseek.com/user/balance
      pricing_source: https://api-docs.deepseek.com/quick_start/pricing
      usage_schema: openai_cache
      pricing:
        usd_cny: 7.2
        aliases:
          deepseek-chat: deepseek-v4-flash
          deepseek-reasoner: deepseek-v4-flash
        models:
          deepseek-v4-flash:
            input_cache_hit: 0.0028
            input_cache_miss: 0.14
            output: 0.28
          deepseek-v4-pro:
            input_cache_hit: 0.003625
            input_cache_miss: 0.435
            output: 0.87
    mimo:
      enabled: true
      label: Mimo
      protocol: openai_compatible
      api_key_env: MIMO_API_KEY
      base_url: https://token-plan-cn.xiaomimimo.com/v1
      default_model: mimo-v2.5-pro
      request:
        chat_path: /chat/completions
        response_format_json: true
        temperature: 0.1
        reasoning_level: thinking_enabled
        context_window_tokens: 1048576
        timeout_seconds: 20
        extra_body:
          thinking:
            type: enabled
