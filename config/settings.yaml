    brokerage: 0.00025
    stamp_duty: 0.0005
    transfer_fee: 1.0e-05
  notification:
    enabled: true
    require_confirmation: false
    signal_change_only: true

# ═══════════════════════════════════════════════════════════
# ★ Data Dimension Registry (Phase 4.1)
# Single source of truth for ALL data dimensions across ALL asset types.
# status: available | rate_limited | paid | planned
# New dimensions: add an entry here + implement a fetcher.
# ═══════════════════════════════════════════════════════════
data_registry:
  # ── Stock: 行情 ──
  ohlcv_daily:
    source: akshare
    asset: stock
    status: available
    freq: daily
    enabled: true
    label: 日线行情 OHLCV
    cache: stock/daily/{symbol}.parquet
    description: 全A股日线, 通过新浪源获取

  adj_factor:
    source: tushare_free
    asset: stock
    status: available
    freq: daily
    enabled: true
    label: 复权因子
    cache: stock/adj_factor/{symbol}.parquet

  # ── Stock: 财务 ──
  financial_summary:
    source: akshare
    asset: stock
    status: available
    freq: quarterly
    enabled: true
    label: 同花顺财务摘要
    cache: stock/financials/{symbol}.parquet
    description: ROE/毛利率/净利率/D-E/净利润

  fina_indicator:
    source: tushare_free
    asset: stock
    status: available
    freq: quarterly
    enabled: true
    label: Tushare 财务指标
    cache: stock/fina_indicator/{symbol}.parquet
    description: 50+指标 EPS/ROA/ROIC/FCFF/FCFE等

  # ── Stock: 估值 ──
