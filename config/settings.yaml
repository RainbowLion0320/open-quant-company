data_cleaning:
  ohlcv_integrity:
    enabled: true
  outlier_detection:
    enabled: true
    sigma: 5
    max_daily_change_pct: 0.2
    max_volume_ratio: 15
  suspended_detection:
    enabled: true
    max_flat_days: 60
  missing_value:
    enabled: true
    max_forward_fill: 5
  financial_validation:
    enabled: true
  winsorize:
    enabled: true
    lower_pct: 0.01
    upper_pct: 0.99
risk_control:
  max_single_position:
    enabled: true
    max_pct: 0.25
  max_total_exposure:
    enabled: true
    max_pct: 0.8
  max_orders_per_day:
    enabled: true
    max_count: 20
  max_drawdown_circuit_breaker:
    enabled: true
    max_drawdown_pct: -0.15
  max_single_order_amount:
    enabled: true
    max_amount: 500000
backtest:
  benchmark: sh000001
  benchmark_name: 上证指数
  initial_cash: 1000000
  periods_per_year: 252
  pool_size: 0
  risk_free_rate: 0.03
  start_date: '2020-01-01'
  strategy:
    cybernetic:
      ma_long: 20
      ma_short: 10
      max_pos_bear: 2
      max_pos_bull: 8
      max_pos_side: 5
      position_bear: 0.05
      position_bull: 0.3
      position_side: 0.15
      regime_ma_long: 60
      regime_ma_mid: 20
      regime_ma_short: 5
      stop_loss_bear: -0.03
      stop_loss_bull: -0.08
      stop_loss_side: -0.05
    multifactor:
      factor_window_long: 60
      factor_window_short: 21
      max_per_sector: 3
      rebalance_interval_days: 20
      score_base: 50
      score_momentum_weight: 100
      score_volatility_weight: 50
      top_n: 10
buffett:
  circle_of_competence:
    industries:
    - 农林牧渔
    - 基础化工
    - 钢铁
    - 有色金属
    - 电子
    - 家用电器
    - 食品饮料
    - 纺织服饰
    - 轻工制造
    - 医药生物
    - 公用事业
    - 交通运输
    - 房地产
    - 商贸零售
    - 社会服务
    - 综合
    - 建筑材料
    - 建筑装饰
    - 电力设备
    - 国防军工
    - 计算机
    - 传媒
    - 通信
    - 银行
    - 非银金融
    - 汽车
    - 机械设备
    - 石油石化
    - 煤炭
    - 环保
    - 美容护理
    - 待分类
  margin_of_safety:
    dcf_discount_rate: 0.08
    growth_rate_terminal: 0.03
    safety_margin_pct: 0.3
  moat:
    max_debt_equity: 1.5
    min_gross_margin: 0.3
    min_roe: 0.15
    min_roe_years: 5
    sectors:
      bank:
        max_debt_equity: 20.0
        min_net_margin: 0.2
        min_roe: 0.1
        skip_gross_margin: true
      insurance:
        max_debt_equity: 20.0
        min_net_margin: 0.05
        min_roe: 0.08
        skip_gross_margin: true
      securities:
        max_debt_equity: 10.0
        min_net_margin: 0.15
        min_roe: 0.06
        skip_gross_margin: true
  scoring:
    cap_margin: 0.6
    cap_roe: 0.25
    cap_safety: 0.5
    weight_margin: 20
    weight_roe: 30
    weight_safety: 50
  valuation:
    fcf_fallback_ratio: 0.7
    growth_default: 0.05
    growth_max: 0.12
    growth_min: 0.03
cybernetics:
  adaptive:
    bear:
      confidence_threshold: 0.85
      max_positions: 2
      position_size: 0.05
      stop_loss: -0.03
    bull:
      confidence_threshold: 0.6
      max_positions: 8
      position_size: 0.3
      stop_loss: -0.08
    detection:
      breadth_window: 20
      volume_contraction: 0.8
      volume_expansion: 1.2
    market_regime_detection: true
    param_tuning_frequency: monthly
    sideways:
      confidence_threshold: 0.75
      max_positions: 5
      position_size: 0.15
      stop_loss: -0.05
    volatility_adjustment: true
  feedback:
    loop_interval: daily
    max_consecutive_losses: 3
    min_trades_for_review: 10
    min_win_rate: 0.35
    performance_review_days: 30
  hierarchy:
    levels:
    - indicators:
      - 指数趋势
      - 市场情绪
      - 资金流向
      name: 市场环境
      priority: 1
    - indicators:
      - 行业强度
      - 板块资金
      - 政策面
      name: 板块轮动
      priority: 2
    - indicators:
      - 基本面
      - 技术面
      - 估值
      name: 个股筛选
      priority: 3
data:
  cache_days: 1
  cache_dir: data/cache
  index:
    csi300: sh000300
    shanghai: sh000001
    shenzhen: sz399001
  provider: akshare
  tushare:
    token: ''
project:
  name: quant-agent
  version: 2.0.0
  description: 个人A股量化交易系统 — 日频 · 自托管 · AI增强
signals:
  multifactor:
    buy_threshold: 52
    market:
      bear:
        bank: 15
        food_beverage: 10
        pharma: 10
        transport: 10
        utilities: 15
      bull:
        computers: 15
        defense: 10
        electrical: 10
        electronics: 15
        securities: 20
      sideways:
        bank: 10
        coal: 10
        construction: 10
        petroleum: 10
        utilities: 10
    quality:
      buffett_weight: 0.6
      roe_cap: 30.0
      roe_multiplier: 1.2
      trend_bonus_down: -5
      trend_bonus_up: 5
    technical:
      default_volatility: 0.3
      mom_multiplier_normal: 200
      mom_multiplier_strong: 400
      mom_strong: 0.15
      vol_max_score: 30
      vol_penalty_mult: 100
      weight_momentum: 0.6
      weight_volatility: 0.4
    valuation:
      score_deep: 80
      score_moderate: 60
      score_slight: 40
      tier_deep_value: 0.5
      tier_moderate_value: 0.3
      tier_slight_value: 0.15
    weights:
      market: 0.15
      quality: 0.4
      technical: 0.15
      valuation: 0.3
signal_selection:
  top_pct: 0.05
  min_buys: 5
  max_buys: 80
  min_score: 50
  strategies:
    multifactor:
      min_score: 52
      max_buys: 80
    cybernetic:
      min_score: 60
      max_buys: 40
    ml_lgbm:
      min_score: 52
      max_buys: 80
ml:
  use_regime_models: true
  score_scale: 5.0
  max_feature_age_months: 3
  allow_stale_features: false
  allow_live_factor_fallback: false
assets:
  stock:
    enabled: true
    label: A股股票
    universe: CIRCLE_STOCKS
    features: true
  etf:
    enabled: true
    label: ETF基金
    universe: ETF_UNIVERSE
    features: true
    adapter: data/assets/etf.py
  bond:
    enabled: false
    label: 债券
    universe: BOND_UNIVERSE
    features: false
    adapter: data/assets/bond.py
  futures:
    enabled: false
    label: 期货
    universe: FUTURES_UNIVERSE
    features: false
    adapter: data/assets/futures.py
  crypto:
    enabled: false
    label: 加密货币
    universe: CRYPTO_UNIVERSE
    adapter: data/assets/crypto.py
  macro:
    enabled: true
    label: 宏观经济
    features: true
asset_allocation:
  max_positions_per_asset: 8
  regime_weights:
    bull:
      stock: 0.6
      etf: 0.3
      cash: 0.1
    sideways:
      stock: 0.35
      etf: 0.35
      cash: 0.3
    bear:
      stock: 0.15
      etf: 0.15
      cash: 0.7
strategies:
  buffett:
    color: '#06b6d4'
    config_key: buffett
    enabled: true
    label: 巴菲特价值精选
    runner: scripts.compute_signals:compute_buffett
    signal_name: buffett
    status: production
  cybernetic:
    color: '#f59e0b'
    config_key: cybernetics
    enabled: true
    label: 控制论自适应
    runner: scripts.compute_signals:compute_cybernetic
    signal_name: cybernetic
    status: production
  multifactor:
    color: '#10b981'
    config_key: signals.multifactor
    enabled: true
    label: 多因子月度调仓
    runner: scripts.compute_signals:compute_multifactor
    signal_name: multifactor
    status: production
  ml_lgbm:
    color: '#8b5cf6'
    config_key: ml
    enabled: true
    label: LightGBM ML
    runner: signals.ml_signals:compute_ml_signals
    signal_name: ml_lgbm
    status: production
trading:
  commission:
    brokerage: 0.00025
    stamp_duty: 0.0005
    transfer_fee: 1.0e-05
  notification:
    enabled: true
    require_confirmation: false
    signal_change_only: true
paper_trading:
  enabled: true
  initial_cash: 1000000
  commission_rate: 0.00081
  t_plus_1: true
  risk_enabled: true
  store_dir: data/store/paper
  lot_size: 100
  order_value_pct: 0.05
  max_order_value: 50000
  max_orders_per_strategy: 5
  sell_all_on_sell_signal: true
  strategies:
  - buffett
  - multifactor
  - cybernetic
  - ml_lgbm
  execution_price: close
  auto_execute: false
data_registry:
  ohlcv_daily:
    source: akshare
    asset: stock
    status: available
    freq: daily
    enabled: true
    label: 日线行情 OHLCV
    cache: stock/daily/{symbol}.parquet
    description: 全A股日线, 通过新浪源获取
  adj_factor:
    source: tushare_free
    asset: stock
    status: available
    freq: daily
    enabled: true
    label: 复权因子
    cache: stock/adj_factor/{symbol}.parquet
  financial_summary:
    source: akshare
    asset: stock
    status: available
    freq: quarterly
    enabled: true
    label: 同花顺财务摘要
    cache: stock/financials/{symbol}.parquet
    description: ROE/毛利率/净利率/D-E/净利润
  fina_indicator:
    source: tushare_free
    asset: stock
    status: available
    freq: quarterly
    enabled: true
    label: Tushare 财务指标
    cache: stock/fina_indicator/{symbol}.parquet
    description: 50+指标 EPS/ROA/ROIC/FCFF/FCFE等
  valuation_daily:
    source: tushare_free
    asset: stock
    status: available
    freq: daily
    enabled: true
    label: 每日估值 PE/PB/PS
    cache: stock/valuation/{symbol}.parquet
  moneyflow_monthly:
    source: tushare_free
    asset: stock
    status: available
    freq: monthly
    enabled: true
    label: 月频资金流向 (全历史)
    cache: stock/moneyflow/monthly/{YYYYMMDD}.parquet
    description: 主力/超大单/大单/中单/小单净流入, 136月全历史
  moneyflow_daily:
    source: akshare
    asset: stock
    status: available
    freq: daily
    enabled: true
