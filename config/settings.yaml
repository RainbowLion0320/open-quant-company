backtest:
  benchmark: sh000001
  benchmark_name: 上证指数
  commission: 0.00081
  engine: pipeline
  initial_cash: 1000000
  periods_per_year: 252
  pipeline:
    portfolio:
      rebalance_freq: ME
    signal:
      top_n: 20
  pool_size: 0
  risk_free_rate: 0.03
  stamp_duty: 0.0005
  start_date: '2020-01-01'
  strategy:
    buffett_cyber:
      circuit_breaker: 3
      cooldown_bars: 15
      ma_long: 20
      ma_short: 5
      max_positions: 8
      position_pct: 0.3
      score_weight_base: 0.5
      score_weight_scale: 100.0
      stop_loss: -0.08
    cybernetic:
      ma_long: 20
      ma_short: 10
      max_pos_bear: 2
      max_pos_bull: 8
      max_pos_side: 5
      position_bear: 0.05
      position_bull: 0.3
      position_side: 0.15
      regime_ma_long: 60
      regime_ma_mid: 20
      regime_ma_short: 5
      stop_loss_bear: -0.03
      stop_loss_bull: -0.08
      stop_loss_side: -0.05
    ma_cross:
      ma_long: 20
      ma_short: 5
      max_positions: 5
      position_pct: 0.3
      stop_loss: -0.08
    multifactor:
      factor_window_long: 60
      factor_window_short: 21
      max_per_sector: 3
      rebalance_interval_days: 20
      score_base: 50
      score_momentum_weight: 100
      score_volatility_weight: 50
      top_n: 10
buffett:
  circle_of_competence:
    industries:
    - 农林牧渔
    - 基础化工
    - 钢铁
    - 有色金属
    - 电子
    - 家用电器
    - 食品饮料
    - 纺织服饰
    - 轻工制造
    - 医药生物
    - 公用事业
    - 交通运输
    - 房地产
    - 商贸零售
    - 社会服务
    - 综合
    - 建筑材料
    - 建筑装饰
    - 电力设备
    - 国防军工
    - 计算机
    - 传媒
    - 通信
    - 银行
    - 非银金融
    - 汽车
    - 机械设备
    - 石油石化
    - 煤炭
    - 环保
    - 美容护理
    - 待分类
  margin_of_safety:
    dcf_discount_rate: 0.08
    growth_rate_terminal: 0.03
    safety_margin_pct: 0.3
  moat:
    max_debt_equity: 1.5
    min_gross_margin: 0.3
    min_roe: 0.15
    min_roe_years: 5
    sectors:
      bank:
        max_debt_equity: 20.0
        min_net_margin: 0.2
        min_roe: 0.1
        skip_gross_margin: true
      insurance:
        max_debt_equity: 20.0
        min_net_margin: 0.05
        min_roe: 0.08
        skip_gross_margin: true
      securities:
        max_debt_equity: 10.0
        min_net_margin: 0.15
        min_roe: 0.06
        skip_gross_margin: true
  scoring:
    cap_margin: 0.6
    cap_roe: 0.25
    cap_safety: 0.5
    weight_margin: 20
    weight_roe: 30
    weight_safety: 50
  valuation:
    fcf_fallback_ratio: 0.7
    growth_default: 0.05
    growth_max: 0.12
    growth_min: 0.03
cybernetics:
  adaptive:
    bear:
      confidence_threshold: 0.85
      max_positions: 2
      position_size: 0.05
      stop_loss: -0.03
    bull:
      confidence_threshold: 0.6
      max_positions: 8
      position_size: 0.3
      stop_loss: -0.08
    detection:
      breadth_window: 20
      volume_contraction: 0.8
      volume_expansion: 1.2
    market_regime_detection: true
    param_tuning_frequency: monthly
    sideways:
      confidence_threshold: 0.75
      max_positions: 5
      position_size: 0.15
      stop_loss: -0.05
    volatility_adjustment: true
  feedback:
    loop_interval: daily
    max_consecutive_losses: 3
    min_trades_for_review: 10
    min_win_rate: 0.35
    performance_review_days: 30
  hierarchy:
    levels:
    - indicators:
      - 指数趋势
      - 市场情绪
      - 资金流向
      name: 市场环境
      priority: 1
    - indicators:
      - 行业强度
      - 板块资金
      - 政策面
      name: 板块轮动
      priority: 2
    - indicators:
      - 基本面
      - 技术面
      - 估值
      name: 个股筛选
      priority: 3
