name: Documentation issue
description: Report unclear, missing, or outdated documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: input
    id: page
    attributes:
      label: Page or file
      placeholder: README.md, docs/specs/backtest.md, wiki/concepts/system-architecture.md
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Documentation problem
      description: What is unclear, outdated, inconsistent, or missing?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Suggested correction
      description: If you know the correct wording or behavior, describe it here.

