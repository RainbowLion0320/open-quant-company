name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example v2.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Build Python package
        run: |
          python -m pip install -U pip build
          python -m build

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Build frontend assets
        working-directory: web/frontend
        run: |
          npm ci
          npm run typecheck
          npm run build
          tar -czf ../../astrolabe-frontend-dist.tar.gz dist

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release_tag.outputs.tag }}" \
            dist/* \
            astrolabe-frontend-dist.tar.gz \
            --title "Astrolabe ${{ steps.release_tag.outputs.tag }}" \
            --notes-file CHANGELOG.md \
            --verify-tag
