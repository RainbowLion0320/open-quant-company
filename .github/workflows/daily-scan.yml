name: Quant Agent Daily Scan

on:
  schedule:
    # 每个交易日 15:30 (UTC+8 → 07:30 UTC)
    - cron: '30 7 * * 1-5'
  workflow_dispatch:  # 手动触发

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install akshare pandas pyarrow backtrader pyyaml requests plotly

      - name: Run Buffett scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
        run: python scripts/scan_all.py
