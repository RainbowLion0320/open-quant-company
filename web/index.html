<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quant Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;510;590;600&display=swap" rel="stylesheet">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  *,::before,::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#08090a;color:#d0d6e0;display:flex;height:100vh;overflow:hidden}
  /* 侧边栏 */
  nav{width:168px;min-width:168px;background:#0c0d0f;border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;padding:1.2rem 0}
  nav .logo{padding:0 1rem .8rem;font-size:.85rem;font-weight:600;color:#f7f8f8;letter-spacing:-.02em;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:.4rem}
  nav .tabs{display:flex;flex-direction:column;gap:1px;padding:0 .5rem}
  nav .tab{padding:.42rem .7rem;border-radius:4px;font-size:.77rem;font-weight:450;color:#8a8f98;cursor:pointer;background:transparent;border:none;text-align:left;letter-spacing:-.01em;transition:none}
  nav .tab:hover{color:#d0d6e0;background:rgba(255,255,255,.03)}
  nav .tab.active{color:#f7f8f8;background:rgba(255,255,255,.06);font-weight:510}
  /* 主区域 */
  main{flex:1;overflow-y:auto;padding:1rem 1.5rem}
  /* Header */
  .header{display:flex;justify-content:space-between;align-items:baseline;padding-bottom:.4rem;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:.6rem}
  .header .brand{font-size:.9rem;color:#f7f8f8;font-weight:590;letter-spacing:-.02em}
  .header .meta{font-size:.68rem;color:#62666d}
  .header .sub{font-size:.68rem;color:#4a5568;margin-top:.15rem}
  .dot{display:inline-block;width:4px;height:4px;border-radius:50%;margin-right:3px;background:#10b981}
  /* KPI 卡片 */
  .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-bottom:1rem}
  .kpi{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:6px;padding:1rem 1.2rem}
  .kpi .lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:.04em;color:#62666d;margin-bottom:.35rem;font-weight:450}
  .kpi .val{font-size:1.5rem;font-weight:590;letter-spacing:-.02em;font-family:'Inter',monospace}
  .kpi .sub{font-size:.68rem;color:#8a8f98;margin-top:.25rem}
  .kpi.green{border-left:2px solid #10b981}.kpi.green .val{color:#10b981}
  .kpi.red{border-left:2px solid #ef4444}.kpi.red .val{color:#ef4444}
  .kpi.gold{border-left:2px solid #f59e0b}.kpi.gold .val{color:#f59e0b}
  .kpi.blue{border-left:2px solid #7170ff}.kpi.blue .val{color:#7170ff}
  /* 标题 */
  h2{font-size:1rem;font-weight:590;color:#f7f8f8;margin:1.2rem 0 .6rem;letter-spacing:-.02em}
  /* 表格 */
  .table-wrap{border:1px solid rgba(255,255,255,.06);border-radius:6px;overflow:hidden;max-height:460px;overflow-y:auto}
  table{width:100%;border-collapse:collapse;font-size:.73rem}
  th{background:rgba(255,255,255,.02);color:#62666d;font-weight:450;text-transform:uppercase;font-size:.63rem;letter-spacing:.03em;padding:.4rem .6rem;text-align:left;position:sticky;top:0;z-index:1}
  td{padding:.32rem .6rem;color:#d0d6e0;border-bottom:1px solid rgba(255,255,255,.03)}
  tr:hover td{background:rgba(255,255,255,.01)}
  .pass td:first-child{color:#10b981}
  .fail-moat td:first-child{color:#ef4444}
  .fail-margin td:first-child{color:#f59e0b}
  /* 卡片网格 */
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.4rem;margin-bottom:1rem}
  .stock-card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:6px;padding:.6rem;text-align:center}
  .stock-card .sc-code{font-size:.62rem;color:#62666d}
  .stock-card .sc-name{font-size:.75rem;color:#f7f8f8;font-weight:510;margin:.15rem 0}
  .stock-card .sc-score{font-size:1.2rem;font-weight:590;color:#10b981}
  .stock-card .sc-ind{font-size:.6rem;color:#8a8f98}
  /* 图表容器 */
  .chart{height:380px;margin-bottom:1rem}
  /* 加载 */
  .loading{display:flex;align-items:center;justify-content:center;height:200px;color:#62666d;font-size:.8rem}
  .page{display:none}
  .page.active{display:block}
  /* 按钮 */
  button.btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#d0d6e0;border-radius:5px;padding:.35rem .8rem;font-size:.7rem;cursor:pointer;font-family:inherit}
  button.btn:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12);color:#f7f8f8}
</style>
</head>
<body>
<nav>
  <div class="logo">Quant</div>
  <div class="tabs">
    <button class="tab active" data-page="market">市场概览</button>
    <button class="tab" data-page="buffett">巴菲特筛选</button>
    <button class="tab" data-page="backtest">回测分析</button>
    <button class="tab" data-page="data">数据管理</button>
  </div>
</nav>

<main>
  <!-- 市场概览 -->
  <div id="page-market" class="page active">
    <div class="header"><span class="brand">市场概览</span><span class="meta"><span class="dot"></span>Live · <span id="mkt-time">--:--</span> · 股票池 1000只</span></div>
    <div class="sub">巴菲特价值投资（决策约束） × 钱学森控制论（运行机制） · 申万一级行业 · Tushare数据</div>
    <div class="kpi-row" id="kpi-row"></div>
    <h2>上证指数</h2>
    <div id="chart-market" class="chart"></div>
  </div>

  <!-- 巴菲特筛选 -->
  <div id="page-buffett" class="page">
    <div class="header"><span class="brand">巴菲特价值投资筛选</span><span class="meta" id="bf-time">--:--</span></div>
    <div class="loading" id="bf-loading">加载扫描结果...</div>
    <div id="bf-content" style="display:none">
      <div class="kpi-row" id="bf-kpi"></div>
      <h2>扫描结果</h2>
      <div class="table-wrap"><table id="bf-table"><thead><tr>
        <th>代码</th><th>名称</th><th>行业</th><th>判定</th><th>评分</th>
        <th>ROE</th><th>毛利率</th><th>净利率</th><th>D/E</th><th>安全边际</th>
      </tr></thead><tbody></tbody></table></div>
      <h2>精选池</h2>
      <div class="card-grid" id="bf-cards"></div>
    </div>
  </div>

  <!-- 回测分析 -->
  <div id="page-backtest" class="page">
    <div class="header"><span class="brand">策略回测</span><span class="meta" id="bt-time">--:--</span></div>
    <div class="loading" id="bt-loading">加载回测数据...</div>
    <div id="bt-content" style="display:none">
      <div class="kpi-row" id="bt-kpi"></div>
      <h2>精选池 vs 上证指数 (2020-2026)</h2>
      <div id="chart-backtest" class="chart"></div>
    </div>
  </div>

  <!-- 数据管理 -->
  <div id="page-data" class="page">
    <div class="header"><span class="brand">数据管理</span><span class="meta" id="dt-time">--:--</span></div>
    <div class="loading" id="dt-loading">加载中...</div>
    <div id="dt-content" style="display:none">
      <div class="kpi-row" id="dt-kpi"></div>
      <h2>缓存文件</h2>
      <div class="table-wrap"><table id="dt-table"><thead><tr><th>文件</th><th>大小(KB)</th><th>修改时间</th><th>已有(小时)</th></tr></thead><tbody></tbody></table></div>
    </div>
  </div>
</main>

<script>
// 页面切换
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + t.dataset.page).classList.add('active');
    if (t.dataset.page === 'buffett') loadBuffett();
    if (t.dataset.page === 'backtest') loadBacktest();
    if (t.dataset.page === 'data') loadData();
  };
});

// 加载市场数据
async function loadMarket() {
  const r = await fetch('/api/market');
  const d = await r.json();
  document.getElementById('mkt-time').textContent = d.updated;

  const regimeLabel = {bull:'多头',bear:'空头',sideways:'震荡'}[d.regime]||d.regime;
  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi gold"><div class="lbl">市场状态</div><div class="val">${regimeLabel}</div><div class="sub">${d.ma_trend?.slice(0,30)}</div></div>
    <div class="kpi blue"><div class="lbl">仓位上限</div><div class="val">${d.params.position_size*100}%</div><div class="sub">止损 ${d.params.stop_loss*100}%</div></div>
    <div class="kpi green"><div class="lbl">涨跌比</div><div class="val">${(d.breadth*100).toFixed(0)}%</div><div class="sub">${d.volume_trend}</div></div>
    <div class="kpi blue"><div class="lbl">最大持仓</div><div class="val">${d.params.max_positions}</div><div class="sub">置信度 ≥${d.params.confidence_threshold}</div></div>
  `;

  // K线图
  const dates = d.kline.map(x => x.date);
  const trace = {
    x: dates, close: d.kline.map(x => x.close), open: d.kline.map(x => x.open),
    high: d.kline.map(x => x.high), low: d.kline.map(x => x.low),
    type: 'candlestick', name: '上证指数',
    increasing: {line: {color: '#10b981'}}, decreasing: {line: {color: '#ef4444'}}
  };
  const layout = {
    template: 'plotly_dark', paper_bgcolor: '#08090a', plot_bgcolor: '#08090a',
    margin: {l:40,r:20,t:10,b:30}, height: 380,
    xaxis: {gridcolor: 'rgba(255,255,255,.04)', zeroline: false},
    yaxis: {gridcolor: 'rgba(255,255,255,.04)', zeroline: false},
    showlegend: false
  };
  Plotly.newPlot('chart-market', [trace], layout, {displayModeBar: false});
}

// 加载巴菲特
async function loadBuffett() {
  const el = document.getElementById('bf-content');
  if (el.style.display !== 'none') return;
  const r = await fetch('/api/buffett');
  const d = await r.json();
  document.getElementById('bf-time').textContent = d.updated;
  document.getElementById('bf-loading').style.display = 'none';
  el.style.display = 'block';

  document.getElementById('bf-kpi').innerHTML = `
    <div class="kpi blue"><div class="lbl">总股票</div><div class="val">${d.total}</div></div>
    <div class="kpi green"><div class="lbl">通过</div><div class="val">${d.passed}</div><div class="sub">${(d.passed/d.total*100).toFixed(1)}%</div></div>
    <div class="kpi red"><div class="lbl">护城河不足</div><div class="val">${d.failed_moat}</div></div>
    <div class="kpi gold"><div class="lbl">安全边际不足</div><div class="val">${d.failed_margin}</div></div>
  `;

  const tbody = document.querySelector('#bf-table tbody');
  tbody.innerHTML = d.results.map(r => {
    let cls = r.verdict.includes('✅') ? 'pass' : r.verdict.includes('护城河') ? 'fail-moat' : 'fail-margin';
    return `<tr class="${cls}">
      <td>${r.symbol}</td><td>${r.name}</td><td>${r.industry}</td><td>${r.verdict}</td>
      <td>${r.score}</td><td>${r.roe}%</td><td>${r.gross_margin!=null?r.gross_margin+'%':'—'}</td>
      <td>${r.net_margin!=null?r.net_margin+'%':'—'}</td><td>${r.de}</td><td>${r.safety_margin}%</td>
    </tr>`;
  }).join('');

  // 精选池卡片
  const passed = d.results.filter(r => r.verdict.includes('✅')).slice(0, 24);
  document.getElementById('bf-cards').innerHTML = passed.map(r => `
    <div class="stock-card">
      <div class="sc-code">${r.symbol}</div>
      <div class="sc-name">${r.name}</div>
      <div class="sc-score">${r.score}</div>
      <div class="sc-ind">${r.industry}</div>
    </div>
  `).join('');
}

// 加载回测
async function loadBacktest() {
  const el = document.getElementById('bt-content');
  if (el.style.display !== 'none') return;
  const r = await fetch('/api/backtest');
  const d = await r.json();
  document.getElementById('bt-time').textContent = d.updated;
  document.getElementById('bt-loading').style.display = 'none';
  el.style.display = 'block';

  document.getElementById('bt-kpi').innerHTML = `
    <div class="kpi"><div class="lbl">回测区间</div><div class="val">2020→2026</div></div>
    <div class="kpi gold"><div class="lbl">上证基准</div><div class="val">${d.bench_return>0?'+':''}${d.bench_return}%</div></div>
    <div class="kpi red"><div class="lbl">策略回报</div><div class="val">+${d.strat_return}%</div><div class="sub">α ${d.alpha>0?'+':''}${d.alpha}%</div></div>
    <div class="kpi"><div class="lbl">交易次数</div><div class="val">${d.trades}</div></div>
  `;

  const traces = d.series.map((s,i) => ({
    x: s.data.map(p => p.date), y: s.data.map(p => p.value),
    type: 'scatter', mode: 'lines', name: s.name,
    line: {width: i===0?2:1, color: i===0?'#62666d':['#10b981','#f59e0b','#7170ff','#ef4444','#f97316','#a78bfa','#22d3ee','#f472b6','#84cc16','#38bdf8'][(i-1)%10],
      dash: i===0?'dash':'solid'}
  }));
  const layout = {
    template: 'plotly_dark', paper_bgcolor: '#08090a', plot_bgcolor: '#08090a',
    margin: {l:40,r:20,t:10,b:30}, height: 400,
    xaxis: {gridcolor: 'rgba(255,255,255,.04)'}, yaxis: {gridcolor: 'rgba(255,255,255,.04)', tickformat: '.0%'},
    legend: {orientation:'h', y: 1.05, font: {color:'#8a8f98', size:9}}
  };
  Plotly.newPlot('chart-backtest', traces, layout, {displayModeBar: false});
}

// 加载数据管理
async function loadData() {
  const el = document.getElementById('dt-content');
  if (el.style.display !== 'none') return;
  const r = await fetch('/api/cache');
  const d = await r.json();
  document.getElementById('dt-time').textContent = new Date().toTimeString().slice(0,5);
  document.getElementById('dt-loading').style.display = 'none';
  el.style.display = 'block';

  document.getElementById('dt-kpi').innerHTML = `
    <div class="kpi"><div class="lbl">缓存文件</div><div class="val">${d.total}</div></div>
    <div class="kpi"><div class="lbl">总大小</div><div class="val">${d.size_mb} MB</div></div>
    <div class="kpi"><div class="lbl">最旧文件</div><div class="val">${d.files.length?d.files[0].age_h.toFixed(0)+'h':'—'}</div></div>
    <div class="kpi"></div>
  `;

  document.querySelector('#dt-table tbody').innerHTML = d.files.map(f =>
    `<tr><td>${f.file}</td><td>${f.size_kb}</td><td>${f.mtime}</td><td>${f.age_h}h</td></tr>`
  ).join('');
}

// 初始化
loadMarket();
</script>
</body>
</html>
